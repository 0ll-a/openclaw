# OpenClaw Railway Deployment Configuration
# Auto-generated for production deployment
# See https://railway.app/docs

[build]
dockerfile = "Dockerfile"

[build.args]
OPENCLAW_EXTENSIONS = ""
OPENCLAW_BUNDLED_PLUGIN_DIR = "extensions"
OPENCLAW_DOCKER_BUILD_SKIP_DTS = "1"

[env]
# Production configuration
NODE_ENV = "production"
LOG_LEVEL = "info"

# Workspace and state
OPENCLAW_PREFER_PNPM = "1"
OPENCLAW_STATE_DIR = "/data/.openclaw"
OPENCLAW_WORKSPACE_DIR = "/data/workspace"
OPENCLAW_CONFIG_DIR = "/data/.openclaw"

# Network
OPENCLAW_DISABLE_BONJOUR = "1"
OPENCLAW_ALLOW_INSECURE_PRIVATE_WS = "false"

# Performance
NODE_OPTIONS = "--max-old-space-size=1536 --enable-source-maps"
OPENCLAW_PREFER_PNPM = "1"

# Security
SECURE_COOKIES = "true"
TRUST_PROXY = "true"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

[[volumes]]
name = "openclaw-data"
mountPath = "/data"

[processes]
web = "node dist/index.js gateway --allow-unconfigured --port \"${PORT:-3000}\" --bind 0.0.0.0"

[healthCheck]
httpPath = "/healthz"
httpPort = 3000
initialDelaySeconds = 15
intervalSeconds = 30
timeoutSeconds = 10
successThreshold = 1
failureThreshold = 3
